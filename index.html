<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image to QR Code Generator</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-lg max-w-md w-full text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Image to QR Code</h1>
        <p class="text-gray-500 text-sm mb-6">Unggah gambar kamu dan ubah menjadi QR Code secara instan.</p>

        <div class="border-2 border-dashed border-gray-300 rounded-xl p-6 mb-6 hover:border-blue-500 transition cursor-pointer relative" id="drop-zone">
            <input type="file" id="file-input" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
            <div id="upload-prompt">
                <svg class="w-12 h-12 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <p class="text-sm text-gray-600 font-medium">Klik atau seret gambar ke sini</p>
                <p class="text-xs text-gray-400 mt-1">Tanpa batasan ukuran file</p>
            </div>
            <img id="image-preview" class="hidden max-h-40 mx-auto rounded-lg shadow-sm" src="#" alt="Preview">
        </div>

        <div id="loading" class="hidden mb-6">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div>
            <p class="text-sm text-blue-600 font-medium">Mengunggah gambar...</p>
        </div>

        <div id="qr-result" class="hidden flex flex-col items-center bg-gray-50 p-4 rounded-xl border border-gray-200">
            <div id="qrcode" class="bg-white p-3 rounded-lg shadow-inner"></div>
            <p class="text-xs text-gray-500 mt-3 break-all" id="image-url"></p>
            <button id="download-btn" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-lg transition shadow-md w-full text-sm">
                Unduh QR Code
            </button>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const imagePreview = document.getElementById('image-preview');
        const uploadPrompt = document.getElementById('upload-prompt');
        const loading = document.getElementById('loading');
        const qrResult = document.getElementById('qr-result');
        const qrcodeContainer = document.getElementById('qrcode');
        const imageUrlText = document.getElementById('image-url');
        const downloadBtn = document.getElementById('download-btn');

        // Ganti dengan API Key ImgBB kamu sendiri (Gratis)
        // Dapatkan di: https://api.imgbb.com/
        const IMGBB_API_KEY = '5a6fa58df34ea2774db8ea7bb7dfdc9a'; 

        // Efek Drag & Drop
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('border-blue-500'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('border-blue-500'), false);
        });

        fileInput.addEventListener('change', handleFileSubmit);

        function handleFileSubmit(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Tampilkan preview gambar
            const reader = new FileReader();
            reader.onload = function(e) {
                imagePreview.src = e.target.result;
                imagePreview.classList.remove('hidden');
                uploadPrompt.classList.add('hidden');
            }
            reader.readAsDataURL(file);

            uploadImageAndGenerateQR(file);
        }

        async function uploadImageAndGenerateQR(file) {
            loading.classList.remove('hidden');
            qrResult.classList.add('hidden');
            qrcodeContainer.innerHTML = ''; // Reset QR sebelumnya

            const formData = new FormData();
            formData.append('image', file);

            try {
                // Upload gambar ke hosting gratis ImgBB
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    const directUrl = data.data.url;
                    
                    // Tampilkan URL teks
                    imageUrlText.innerText = directUrl;

                    // Generate QR Code dari URL Gambar
                    new QRCode(qrcodeContainer, {
                        text: directUrl,
                        width: 200,
                        height: 200,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });

                    loading.classList.add('hidden');
                    qrResult.classList.remove('hidden');
                } else {
                    alert('Gagal mengunggah gambar. Coba lagi.');
                    resetUI();
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Terjadi kesalahan koneksi.');
                resetUI();
            }
        }

        function resetUI() {
            loading.classList.add('hidden');
            imagePreview.classList.add('hidden');
            uploadPrompt.classList.remove('hidden');
            fileInput.value = '';
        }

        // Fungsi Unduh QR Code
        downloadBtn.addEventListener('click', () => {
            const qrImage = qrcodeContainer.querySelector('img');
            if (qrImage) {
                const link = document.createElement('a');
                link.href = qrImage.src;
                link.download = 'qrcode-image.png';
                link.click();
            } else {
                // Mengatasi fallback canvas jika img belum ke-render
                const qrCanvas = qrcodeContainer.querySelector('canvas');
                const link = document.createElement('a');
                link.href = qrCanvas.toDataURL("image/png");
                link.download = 'qrcode-image.png';
                link.click();
            }
        });
    </script>
</body>
</html>
